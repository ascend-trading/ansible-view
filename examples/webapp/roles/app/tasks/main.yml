---
# App role — creates the app user, deploys code, and starts the service
- name: Create app user
  user:
    name: "{{ app_user }}"
    system: true
    shell: /bin/bash
    home: "{{ app_dir }}"
  tags: [app, user]

- name: Deploy application
  import_tasks: deploy.yml
  tags: [app, deploy]

- name: Run database migrations
  import_tasks: migrate.yml
  tags: [app, migrate, db]
