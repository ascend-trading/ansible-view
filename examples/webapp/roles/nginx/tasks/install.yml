---
- name: Install nginx package
  apt:
    name: nginx
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  register: nginx_installed
  tags: [nginx, packages]

- name: Install nginx (RedHat)
  yum:
    name: nginx
    state: present
  when: ansible_os_family == "RedHat"
  register: nginx_installed
  tags: [nginx, packages]

- name: Enable nginx service
  systemd:
    name: nginx
    enabled: true
    state: started
  tags: [nginx, service]
