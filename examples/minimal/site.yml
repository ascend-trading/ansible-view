---
# Minimal example — single play with tasks, a handler, and a block
# Good for a quick first look at ansible-view output
- name: Install and start web server
  hosts: all
  become: true
  vars:
    http_port: 80
    package_name: nginx

  tasks:
    - name: Install nginx
      apt:
        name: "{{ package_name }}"
        state: present
      when: ansible_os_family == "Debian"
      register: nginx_install
      notify: restart nginx
      tags: [install]

    - name: Deploy config with error handling
      block:
        - name: Write nginx config
          copy:
            content: "server { listen {{ http_port }}; }"
            dest: /etc/nginx/conf.d/default.conf
          notify: reload nginx

        - name: Validate config
          command: nginx -t
          register: config_test
          changed_when: false

      rescue:
        - name: Restore backup config
          copy:
            src: /etc/nginx/conf.d/default.conf.bak
            dest: /etc/nginx/conf.d/default.conf
            remote_src: true

      always:
        - name: Log config status
          debug:
            msg: "Config status: {{ config_test.rc | default('unknown') }}"

    - name: Open firewall port
      include_tasks: tasks/firewall.yml
      tags: [firewall]

  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted

    - name: reload nginx
      service:
        name: nginx
        state: reloaded
